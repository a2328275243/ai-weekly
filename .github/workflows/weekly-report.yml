# ai-weekly GitHub Action
# 每周一早上 9 点自动生成周报，发到 Issue 里
#
# 使用方法：把这个文件复制到你的仓库 .github/workflows/weekly-report.yml
# 可选：设置 AI_API_KEY secret 启用 AI 润色

name: Weekly Report

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一 UTC 01:00 (北京时间 09:00)
  workflow_dispatch:       # 也可以手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整 git 历史

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ai-weekly
        run: pip install ai-weekly

      - name: Generate report
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          ai-weekly generate --quiet -o report.md
          echo "REPORT<<EOF" >> $GITHUB_ENV
          cat report.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📝 周报 ${today}`,
              body: process.env.REPORT,
              labels: ['weekly-report']
            });
